# fly.toml app configuration file generated for insanely-great-writer-holy-fog-4587 on 2026-03-20T20:03:25-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'insanely-great-writer-holy-fog-4587'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'app_storage'
  destination = '/rails/storage'

[env]
  APP_HOST = 'insanely-great-writer-holy-fog-4587.fly.dev'
  APP_PORT = '443'
  SOLID_QUEUE_IN_PUMA = 'true'
  RAILS_LOG_LEVEL = 'info'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
